name: recall
description: "Personal follow-up, callback & deadline tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  call_log: ^6.0.1
  permission_handler: ^12.0.3
  uuid: ^4.4.0
  omni_datetime_picker: ^2.0.3
  table_calendar: ^3.1.2
  path_provider: ^2.1.3
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  flutter_slidable: ^4.0.3
  badges: ^3.1.2
  gap: ^3.0.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/illustrations/
